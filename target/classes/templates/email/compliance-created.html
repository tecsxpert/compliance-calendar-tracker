<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    .card { background: #fff; border-radius: 8px; padding: 24px; max-width: 560px; margin: auto; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    h2 { color: #2e7d32; }
    .label { color: #666; font-size: 13px; }
    .value { font-weight: bold; color: #333; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; background: #e8f5e9; color: #2e7d32; }
    .footer { margin-top: 24px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
<div class="card">
  <h2>&#x2705; New Compliance Record Created</h2>
  <p>A new compliance item has been added to the system.</p>
  <table cellpadding="6">
    <tr><td class="label">Title</td><td class="value" th:text="${title}"></td></tr>
    <tr><td class="label">Status</td><td><span class="badge" th:text="${status}"></span></td></tr>
    <tr><td class="label">Due Date</td><td class="value" th:text="${dueDate}"></td></tr>
    <tr><td class="label">Description</td><td th:text="${description}"></td></tr>
  </table>
  <div class="footer">Compliance Calendar Tracker &mdash; automated notification</div>
</div>
</body>
</html>
