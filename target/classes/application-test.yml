# Test profile — overrides only what differs from application.yml
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/compliance_db_test
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  # Disable real mail sending in tests
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  mail:
    from: test@test.com
    admin-email: admin@test.com

logging:
  level:
    com.example.tool: WARN
    org.flywaydb: WARN
