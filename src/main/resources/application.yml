spring:
  application:
    name: compliance-calendar-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/compliance_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: sangubasnale@gmail.com      # Replace with actual sender email
    password: Sangu#290304         # Replace with Gmail App Password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:default-secret-change-in-production-must-be-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}

notification:
  email:
    recipient: ${NOTIFICATION_EMAIL:admin@example.com}

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

logging:
  level:
    com.example.tool: INFO
    com.example.tool.scheduler: INFO   # Shows all scheduler task logs
    org.springframework.security: WARN
    org.flywaydb: INFO
    org.springframework.scheduling: DEBUG  # Uncomment to debug cron trigger timing

jwt:
  secret: Y29tcGxpYW5jZS1jYWxlbmRhci10cmFja2VyLXNlY3JldC1rZXktMjAyNg==
