spring:
  application:
    name: compliance-calendar-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/compliance_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.example.tool: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
