spring:
  application:
    name: compliance-calendar-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/compliance_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com      # Replace with actual sender email
    password: your-app-password         # Replace with Gmail App Password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080

logging:
  level:
    com.example.tool: INFO
    com.example.tool.scheduler: INFO   # Shows all scheduler task logs
    org.springframework.security: WARN
    org.flywaydb: INFO
    org.springframework.scheduling: DEBUG  # Uncomment to debug cron trigger timing

jwt:
  secret: Y29tcGxpYW5jZS1jYWxlbmRhci10cmFja2VyLXNlY3JldC1rZXktMjAyNg==
  access-token-expiration: 900000       # 15 minutes
  refresh-token-expiration: 604800000   # 7 days

  # ── Email (Day 7) ────────────────────────────────────────────
app:
  mail:
    from: your-email@gmail.com
    admin-email: admin@yourcompany.com
